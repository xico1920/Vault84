<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vault 84</title>
  <link href="https://fonts.googleapis.com/css?family=VT323" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/img/logo_voltec2.png" type="image/png">
  <link rel="preload" href="assets/img/logo_voltec2.png" as="image">
</head>
<body class="noisy">

  <div class="monitor-shell">

    <div class="frame" id="crt-frame">
      <div class="game" style="position:absolute;inset:0;overflow:hidden;transform-origin:center center;pointer-events:auto;"></div>
      <div class="scanlines" style="position:absolute;inset:0;pointer-events:none;z-index:11;border-radius:1.2rem;transform-origin:center center;"></div>
      <div class="glow"      style="position:absolute;inset:0;pointer-events:none;z-index:1;transform-origin:center center;"></div>
    </div>

    <div class="crt-controls">

      <div class="ctrl-cluster ctrl-left">
        <button class="power-btn" id="power-btn" title="Power">
          <span class="power-icon">&#9211;</span>
        </button>
        <div class="led-stack">
          <div class="led led-power" id="led-power"></div>
          <div class="led led-disk"  id="led-disk"></div>
          <div class="led led-net"   id="led-net"></div>
        </div>
      </div>

      <div class="ctrl-center">
        <span class="monitor-model">VOLTEC TECHNOLOGIES</span>
        <span class="monitor-sub">CHROMA-SCAN 3000XL &mdash; HI-RES PHOSPHOR DISPLAY</span>
      </div>

      <div class="ctrl-cluster ctrl-right">
        <div class="dial-wrap" title="Drag up/down">
          <div class="dial" id="dial-brightness"><div class="dial-marker"></div></div>
          <span class="dial-label">BRILHO</span>
        </div>
        <div class="dial-wrap" title="Drag up/down">
          <div class="dial" id="dial-contrast"><div class="dial-marker"></div></div>
          <span class="dial-label">CONTRASTE</span>
        </div>
      </div>

    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    (function() {
      var s1 = document.createElement('script');
      s1.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
      s1.onload = function() { if(typeof GLTFLoader !== 'undefined') THREE.GLTFLoader = GLTFLoader; };
      document.head.appendChild(s1);
      var s2 = document.createElement('script');
      s2.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js';
      s2.onload = function() { if(typeof OBJLoader !== 'undefined') THREE.OBJLoader = OBJLoader; };
      document.head.appendChild(s2);
    })();
  </script>

  <script type="module" src="scripts/main.js"></script>

  <script>
    window.addEventListener('load', function() {
      var frame     = document.getElementById('crt-frame');
      var game      = frame.querySelector('.game');
      var scanlines = frame.querySelector('.scanlines');
      var glow      = frame.querySelector('.glow');
      var powerBtn  = document.getElementById('power-btn');
      var ledPower  = document.getElementById('led-power');
      var ledDisk   = document.getElementById('led-disk');
      var ledNet    = document.getElementById('led-net');
      var dialBri   = document.getElementById('dial-brightness');
      var dialCon   = document.getElementById('dial-contrast');

      var powered = true, brightness = 100, contrast = 100;
      var crtAnimating = false;

      // Apply transform + filter to all three layers simultaneously
      function setCRT(scaleY, scaleX, br, sat, opacity) {
        var t = 'scaleY('+scaleY+') scaleX('+scaleX+')';
        game.style.transform      = t;
        scanlines.style.transform = t;
        glow.style.transform      = t;
        game.style.filter = 'brightness('+br+') saturate('+sat+')';
        if (opacity != null) {
          game.style.opacity      = opacity;
          scanlines.style.opacity = opacity;
          glow.style.opacity      = opacity;
        }
      }

      function resetCRT() {
        game.style.transform      = '';
        game.style.filter         = '';
        game.style.opacity        = '';
        scanlines.style.transform = '';
        scanlines.style.opacity   = '';
        glow.style.transform      = '';
        glow.style.opacity        = '';
      }

      function applyFilter() {
        if (powered) frame.style.filter = 'brightness('+brightness/100+') contrast('+contrast/100+')';
      }

      // Animate a numeric value with easing
      function anim(from, to, ms, ease, onVal, onDone) {
        var start = Date.now();
        function step() {
          var t = Math.min(1, (Date.now() - start) / ms);
          var e = ease === 'in'  ? t * t :
                  ease === 'out' ? 1 - (1-t)*(1-t) :
                  ease === 'cubic-out' ? 1 - Math.pow(1-t, 3) : t;
          onVal(from + (to - from) * e);
          if (t < 1) requestAnimationFrame(step);
          else { onVal(to); onDone(); }
        }
        requestAnimationFrame(step);
      }

      // ── SHUTDOWN ─────────────────────────────────────────────────
      function crtShutdown(cb) {
        crtAnimating = true;
        var t = 0;
        var fl = setInterval(function() {
          game.style.opacity = t % 2 === 0 ? '0.15' : '1';
          t++;
          if (t >= 8) {
            clearInterval(fl);
            game.style.opacity = '1';
            game.style.transition = 'filter 0.06s ease-out';
            game.style.filter = 'brightness(4) saturate(0)';
            setTimeout(function() {
              game.style.transition = '';
              // Stage 3: squeeze vertically
              anim(1.0, 0.0, 230, 'in',
                function(v) { setCRT(Math.max(0.008, v), 1, 1+(1-v)*3, v, null); },
                function() {
                  // Stage 4: collapse horizontally
                  anim(1.0, 0.0, 160, 'in',
                    function(v) { setCRT(0.008, Math.max(0, v), 4, 0, null); },
                    function() {
                      // screen off — hide everything, no transform snap
                      setCRT(0.008, 0, 1, 1, '0');
                      crtAnimating = false;
                      if (cb) cb();
                    }
                  );
                }
              );
            }, 70);
          }
        }, 55);
      }

      // ── WARMUP ───────────────────────────────────────────────────
      function crtWarmup(cb) {
        crtAnimating = true;
        setCRT(0.008, 0, 4, 0, '1');

        setTimeout(function() {
          // Stage 1: expand horizontally
          anim(0.0, 1.0, 220, 'out',
            function(v) { setCRT(0.008, v, 4, 0, null); },
            function() {
              // Stage 2: expand vertically
              anim(0.008, 1.0, 700, 'cubic-out',
                function(v) {
                  var sat = (v - 0.008) / (1.0 - 0.008);
                  setCRT(v, 1, 1+(1-sat)*2, sat, null);
                },
                function() {
                  // Stage 3: colour normalises
                  game.style.transition = 'filter 0.9s ease-out';
                  game.style.filter = 'brightness(1) saturate(1)';
                  setTimeout(function() {
                    game.style.transition = '';
                    game.style.filter     = '';
                    resetCRT();
                    crtAnimating = false;
                    if (cb) cb();
                  }, 950);
                }
              );
            }
          );
        }, 40);
      }

      // ── Power button ─────────────────────────────────────────────
      powerBtn.addEventListener('click', function() {
        if (crtAnimating) return;

        if (powered) {
          powered = false;
          powerBtn.classList.add('off');
          ledPower.classList.add('led-off');
          // Fade dial markers out
          document.querySelectorAll('.dial-marker').forEach(function(d){ d.style.opacity='0'; });
          if (window._SE) window._SE.powerOff();
          var cur = window._getCurrentScreen ? window._getCurrentScreen() : null;
          if (cur === 'boot') sessionStorage.setItem('vault84_boot_interrupted', '1');
          if (window._pauseGame) window._pauseGame();
          var gd = frame.querySelector('.game');
          if (gd) gd.dispatchEvent(new CustomEvent('vault84:mute'));
          crtShutdown(function(){});

        } else {
          powered = true;
          powerBtn.classList.remove('off');
          ledPower.classList.remove('led-off');
          // Fade dial markers back in
          document.querySelectorAll('.dial-marker').forEach(function(d){ d.style.opacity='1'; });
          if (window._SE) window._SE.powerOn();
          if (window._resumeGame) window._resumeGame();
          var gd = frame.querySelector('.game');
          if (gd) gd.dispatchEvent(new CustomEvent('vault84:unmute'));
          crtWarmup(function(){});
        }
      });

      // ── Dials ────────────────────────────────────────────────────
      function makeDial(el, cb) {
        var drag=false, sy=0, sa=0, angle=0;
        function set(a) {
          angle = Math.max(-130, Math.min(130, a));
          el.style.transform = 'rotate('+angle+'deg)';
          cb((angle+130)/260);
        }
        el.addEventListener('mousedown', function(e){ drag=true; sy=e.clientY; sa=angle; e.preventDefault(); document.body.style.cursor='ns-resize'; });
        window.addEventListener('mousemove', function(e){ if(drag) set(sa+(sy-e.clientY)*1.4); });
        window.addEventListener('mouseup', function(){ drag=false; document.body.style.cursor=''; });
        el.addEventListener('touchstart', function(e){ drag=true; sy=e.touches[0].clientY; sa=angle; e.preventDefault(); },{passive:false});
        window.addEventListener('touchmove', function(e){ if(drag) set(sa+(sy-e.touches[0].clientY)*1.4); });
        window.addEventListener('touchend', function(){ drag=false; });
        set(0);
      }
      makeDial(dialBri, function(t){ brightness=40+t*100; applyFilter(); });
      makeDial(dialCon, function(t){ contrast=60+t*80; applyFilter(); });

      // ── LEDs ─────────────────────────────────────────────────────
      var diskTimer;
      new MutationObserver(function() {
        if (!powered) return;
        ledDisk.classList.add('led-active');
        clearTimeout(diskTimer);
        diskTimer = setTimeout(function(){ ledDisk.classList.remove('led-active'); }, 90);
      }).observe(document.body, { childList:true, subtree:true, characterData:true });

      function netPulse() {
        if (powered) { ledNet.classList.add('led-active'); setTimeout(function(){ ledNet.classList.remove('led-active'); }, 140); }
        setTimeout(netPulse, 2800+Math.random()*5000);
      }
      setTimeout(netPulse, 1500);
    });
  </script>

</body>
</html>
