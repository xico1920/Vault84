<body class="noisy">

  <!-- ── In-app browser warning ──────────────────────────────────────── -->
  <div id="inapp-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:#020f07;border-bottom:1px solid #14fdce;padding:10px 14px;font-family:monospace;font-size:0.78rem;color:#14fdce;letter-spacing:1px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <span style="color:#ff8800;">⚠</span>
    <span style="flex:1;">VAULT 84 requires a full browser. <strong>Open in Chrome / Safari</strong> for the best experience.</span>
    <button onclick="this.parentElement.style.display='none'" style="background:transparent;border:1px solid #3d9970;color:#3d9970;padding:2px 8px;cursor:pointer;font-family:monospace;font-size:0.72rem;letter-spacing:1px;">DISMISS</button>
  </div>
  <script>
    (function(){
      var ua = navigator.userAgent || '';
      var inApp = /LinkedInApp|FBAN|FBAV|Instagram|Line\/|MicroMessenger/i.test(ua)
               || (/Android/.test(ua) && /wv/.test(ua));
      if (inApp) {
        var b = document.getElementById('inapp-banner');
        if (b) b.style.display = 'flex';
      }
    })();
  </script>

  <!-- ── Global error boundary ───────────────────────────────────────── -->
  <script>
    window.addEventListener('error', function(e) {
      if (document.getElementById('vault84-crash')) return;
      var el = document.createElement('div');
      el.id = 'vault84-crash';
      el.style.cssText = 'position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#020f07;z-index:99998;color:#ff2222;font-family:monospace;font-size:0.85rem;letter-spacing:1px;padding:2rem;text-align:center;gap:1rem;';
      el.innerHTML = '<div style="color:#14fdce;font-size:1rem;letter-spacing:3px;">!! SYSTEM ERROR</div>'
        + '<div style="color:#ff8800;">VAULT 84 could not initialise in this browser.</div>'
        + '<div style="color:#3d9970;font-size:0.72rem;">Open in <strong style="color:#14fdce;">Chrome</strong> or <strong style="color:#14fdce;">Safari</strong> for full support.</div>'
        + '<a href="' + location.href + '" style="margin-top:0.5rem;color:#14fdce;font-size:0.72rem;border-bottom:1px solid #14fdce;">↗ OPEN IN BROWSER</a>';
      document.body.appendChild(el);
    });
    window.addEventListener('unhandledrejection', function(e) {
      window.dispatchEvent(new ErrorEvent('error', { message: e.reason }));
    });
  </script>

  <div class="monitor-shell">

    <div class="frame" id="crt-frame">
      <div class="game" style="position:absolute;inset:0;overflow:hidden;transform-origin:center center;pointer-events:auto;"></div>
      <div class="scanlines" style="position:absolute;inset:0;pointer-events:none;z-index:11;border-radius:1.2rem;transform-origin:center center;"></div>
      <div class="glow"      style="position:absolute;inset:0;pointer-events:none;z-index:1;transform-origin:center center;"></div>
    </div>

    <div class="crt-controls">

      <div class="ctrl-cluster ctrl-left">
        <button class="power-btn" id="power-btn" title="Power">
          <span class="power-icon">
            <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <path d="M10 3v7"/>
              <path d="M6.2 5.2A7 7 0 1 0 13.8 5.2"/>
            </svg>
          </span>
        </button>
        <div class="led-stack">
          <div class="led led-power" id="led-power"></div>
          <div class="led led-disk"  id="led-disk"></div>
          <div class="led led-net"   id="led-net"></div>
        </div>
      </div>

      <div class="ctrl-center">
        <span class="monitor-model">VOLTEC TECHNOLOGIES</span>
        <span class="monitor-sub">CHROMA-SCAN 3000XL &mdash; HI-RES PHOSPHOR DISPLAY</span>
      </div>

      <div class="ctrl-cluster ctrl-right">
        <div class="dial-wrap" title="Drag up/down">
          <div class="dial" id="dial-brightness"><div class="dial-marker"></div></div>
          <span class="dial-label" id="lbl-brightness">BRILHO</span>
        </div>
        <div class="dial-wrap" title="Drag up/down">
          <div class="dial" id="dial-contrast"><div class="dial-marker"></div></div>
          <span class="dial-label" id="lbl-contrast">CONTRASTE</span>
        </div>
        <div class="lang-toggle-wrap">
          <span class="lang-opt" id="lang-opt-pt">PT</span>
          <label class="lang-switch" title="Language / Idioma">
            <input type="checkbox" id="lang-input">
            <span class="lang-rocker"><span class="lang-knob"></span></span>
          </label>
          <span class="lang-opt" id="lang-opt-en">EN</span>
        </div>
      </div>

    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script type="module" src="scripts/main.js"></script>

  <script>
    window.addEventListener('load', function() {
      var frame     = document.getElementById('crt-frame');
      var game      = frame.querySelector('.game');
      var scanlines = frame.querySelector('.scanlines');
      var glow      = frame.querySelector('.glow');
      var powerBtn  = document.getElementById('power-btn');
      var ledPower  = document.getElementById('led-power');
      var ledDisk   = document.getElementById('led-disk');
      var ledNet    = document.getElementById('led-net');
      var dialBri   = document.getElementById('dial-brightness');
      var dialCon   = document.getElementById('dial-contrast');

      var powered = true, brightness = 100, contrast = 100;
      var crtAnimating = false;

      // Apply transform + filter to all three layers simultaneously
      function setCRT(scaleY, scaleX, br, sat, opacity) {
        var t = 'scaleY('+scaleY+') scaleX('+scaleX+')';
        game.style.transform      = t;
        scanlines.style.transform = t;
        glow.style.transform      = t;
        game.style.filter = 'brightness('+br+') saturate('+sat+')';
        if (opacity != null) {
          game.style.opacity      = opacity;
          scanlines.style.opacity = opacity;
          glow.style.opacity      = opacity;
        }
      }

      function resetCRT() {
        game.style.transform      = '';
        game.style.filter         = '';
        game.style.opacity        = '';
        scanlines.style.transform = '';
        scanlines.style.opacity   = '';
        glow.style.transform      = '';
        glow.style.opacity        = '';
      }

      function applyFilter() {
        if (powered) frame.style.filter = 'brightness('+brightness/100+') contrast('+contrast/100+')';
      }

      // Animate a numeric value with easing
      function anim(from, to, ms, ease, onVal, onDone) {
        var start = Date.now();
        function step() {
          var t = Math.min(1, (Date.now() - start) / ms);
          var e = ease === 'in'  ? t * t :
                  ease === 'out' ? 1 - (1-t)*(1-t) :
                  ease === 'cubic-out' ? 1 - Math.pow(1-t, 3) : t;
          onVal(from + (to - from) * e);
          if (t < 1) requestAnimationFrame(step);
          else { onVal(to); onDone(); }
        }
        requestAnimationFrame(step);
      }

      // ── SHUTDOWN ─────────────────────────────────────────────────
      function crtShutdown(cb) {
        crtAnimating = true;
        var t = 0;
        var fl = setInterval(function() {
          game.style.opacity = t % 2 === 0 ? '0.15' : '1';
          t++;
          if (t >= 8) {
            clearInterval(fl);
            game.style.opacity = '1';
            game.style.transition = 'filter 0.06s ease-out';
            game.style.filter = 'brightness(4) saturate(0)';
            setTimeout(function() {
              game.style.transition = '';
              // Stage 3: squeeze vertically
              anim(1.0, 0.0, 230, 'in',
                function(v) { setCRT(Math.max(0.008, v), 1, 1+(1-v)*3, v, null); },
                function() {
                  // Stage 4: collapse horizontally
                  anim(1.0, 0.0, 160, 'in',
                    function(v) { setCRT(0.008, Math.max(0, v), 4, 0, null); },
                    function() {
                      // screen off — hide everything, no transform snap
                      setCRT(0.008, 0, 1, 1, '0');
                      crtAnimating = false;
                      if (cb) cb();
                    }
                  );
                }
              );
            }, 70);
          }
        }, 55);
      }

      // ── WARMUP ───────────────────────────────────────────────────
      function crtWarmup(cb) {
        crtAnimating = true;
        setCRT(0.008, 0, 4, 0, '1');

        setTimeout(function() {
          // Stage 1: expand horizontally
          anim(0.0, 1.0, 220, 'out',
            function(v) { setCRT(0.008, v, 4, 0, null); },
            function() {
              // Stage 2: expand vertically
              anim(0.008, 1.0, 700, 'cubic-out',
                function(v) {
                  var sat = (v - 0.008) / (1.0 - 0.008);
                  setCRT(v, 1, 1+(1-sat)*2, sat, null);
                },
                function() {
                  // Stage 3: colour normalises
                  game.style.transition = 'filter 0.9s ease-out';
                  game.style.filter = 'brightness(1) saturate(1)';
                  setTimeout(function() {
                    game.style.transition = '';
                    game.style.filter     = '';
                    resetCRT();
                    crtAnimating = false;
                    if (cb) cb();
                  }, 950);
                }
              );
            }
          );
        }, 40);
      }

      // ── Power button ─────────────────────────────────────────────
      powerBtn.addEventListener('click', function() {
        if (crtAnimating) return;

        if (powered) {
          powered = false;
          powerBtn.classList.add('off');
          ledPower.classList.add('led-off');
          // Fade dial markers out
          document.querySelectorAll('.dial-marker').forEach(function(d){ d.style.opacity='0'; });
          document.querySelectorAll('.lang-opt,.lang-knob').forEach(function(d){ d.style.opacity='0'; });
          if (window._SE) window._SE.powerOff();
          var cur = window._getCurrentScreen ? window._getCurrentScreen() : null;
          if (cur === 'boot') sessionStorage.setItem('vault84_boot_interrupted', '1');
          if (window._pauseGame) window._pauseGame();
          var gd = frame.querySelector('.game');
          if (gd) gd.dispatchEvent(new CustomEvent('vault84:mute'));
          crtShutdown(function(){});

        } else {
          powered = true;
          powerBtn.classList.remove('off');
          ledPower.classList.remove('led-off');
          // Fade dial markers back in
          document.querySelectorAll('.dial-marker').forEach(function(d){ d.style.opacity='1'; });
          document.querySelectorAll('.lang-opt,.lang-knob').forEach(function(d){ d.style.opacity='1'; });
          if (window._SE) window._SE.powerOn();
          if (window._resumeGame) window._resumeGame();
          var gd = frame.querySelector('.game');
          if (gd) gd.dispatchEvent(new CustomEvent('vault84:unmute'));
          crtWarmup(function(){});
        }
      });

      // ── Dials ────────────────────────────────────────────────────
      function makeDial(el, cb) {
        var drag=false, sy=0, sa=0, angle=0;
        function set(a) {
          angle = Math.max(-130, Math.min(130, a));
          el.style.transform = 'rotate('+angle+'deg)';
          cb((angle+130)/260);
        }
        el.addEventListener('mousedown', function(e){ drag=true; sy=e.clientY; sa=angle; e.preventDefault(); document.body.style.cursor='ns-resize'; });
        window.addEventListener('mousemove', function(e){ if(drag) set(sa+(sy-e.clientY)*1.4); });
        window.addEventListener('mouseup', function(){ drag=false; document.body.style.cursor=''; });
        el.addEventListener('touchstart', function(e){ drag=true; sy=e.touches[0].clientY; sa=angle; e.preventDefault(); },{passive:false});
        window.addEventListener('touchmove', function(e){ if(drag) set(sa+(sy-e.touches[0].clientY)*1.4); });
        window.addEventListener('touchend', function(){ drag=false; });
        set(0);
      }
      makeDial(dialBri, function(t){ brightness=40+t*100; applyFilter(); });
      makeDial(dialCon, function(t){ contrast=60+t*80; applyFilter(); });

      // ── LEDs ─────────────────────────────────────────────────────
      var diskTimer;
      new MutationObserver(function() {
        if (!powered) return;
        ledDisk.classList.add('led-active');
        clearTimeout(diskTimer);
        diskTimer = setTimeout(function(){ ledDisk.classList.remove('led-active'); }, 90);
      }).observe(document.body, { childList:true, subtree:true, characterData:true });

      function netPulse() {
        if (powered) { ledNet.classList.add('led-active'); setTimeout(function(){ ledNet.classList.remove('led-active'); }, 140); }
        setTimeout(netPulse, 2800+Math.random()*5000);
      }
      setTimeout(netPulse, 1500);

      // ── Language toggle ───────────────────────────────────────────
      var langInput  = document.getElementById('lang-input');
      var langOptPt  = document.getElementById('lang-opt-pt');
      var langOptEn  = document.getElementById('lang-opt-en');
      var lblBri     = document.getElementById('lbl-brightness');
      var lblCon     = document.getElementById('lbl-contrast');

      var DIAL_LABELS = {
        PT: { bri: 'BRILHO', con: 'CONTRASTE' },
        EN: { bri: 'BRIGHTNESS', con: 'CONTRAST' }
      };

      function applyLangUI(lang) {
        var isEn = lang === 'EN';
        langInput.checked = isEn;
        langOptPt.classList.toggle('lang-active', !isEn);
        langOptEn.classList.toggle('lang-active',  isEn);
        if (lblBri) lblBri.textContent = DIAL_LABELS[lang].bri;
        if (lblCon) lblCon.textContent = DIAL_LABELS[lang].con;
      }

      // Init — always default to EN for first visit
      var savedLang = 'EN';
      try { savedLang = localStorage.getItem('vault84_lang') || 'EN'; } catch(_) {}
      applyLangUI(savedLang);

      // ── Per-element glitch transition ─────────────────────────────
      function glitchEl(el, newText, delay) {
        setTimeout(function() {
          el.classList.add('lang-glitch');
          // Update text at animation midpoint (~140ms into 280ms)
          setTimeout(function() {
            el.textContent = newText;
          }, 140);
          el.addEventListener('animationend', function() {
            el.classList.remove('lang-glitch');
          }, { once: true });
        }, delay);
      }

      function playElementGlitch() {
        var gameDiv = frame.querySelector('.game');
        if (!gameDiv) return;

        var items = [];

        // Nav labels
        gameDiv.querySelectorAll('.nav-list a[data-i18n]').forEach(function(a) {
          var lbl = a.querySelector('.nav-label');
          if (lbl && window.t) items.push({ el: lbl, text: window.t(a.dataset.i18n) });
        });

        // HUD labels and log header
        gameDiv.querySelectorAll('.hud-lbl[data-i18n], [data-i18n].log-header-label').forEach(function(el) {
          if (window.t) items.push({ el: el, text: window.t(el.dataset.i18n) });
        });

        if (!items.length) return;

        // Shuffle for organic feel
        for (var i = items.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = items[i]; items[i] = items[j]; items[j] = tmp;
        }

        var STAGGER = 30; // ms between each element

        items.forEach(function(item, idx) {
          glitchEl(item.el, item.text, idx * STAGGER);
        });

        // Re-render the active department content at the midpoint of the sequence
        var deptAt = Math.round(items.length / 2) * STAGGER;
        setTimeout(function() {
          var content = document.getElementById('game-content');
          if (content) {
            content.style.opacity = '0';
            content.style.transition = 'opacity 0.07s ease-out';
          }
          var activeDept = gameDiv.querySelector('.nav-list a.active');
          var deptKey = activeDept ? activeDept.dataset.screen : 'status';
          if (window._navManager) window._navManager.navigateTo(deptKey);
          setTimeout(function() {
            if (content) {
              content.style.transition = 'opacity 0.18s ease-in';
              content.style.opacity = '1';
              setTimeout(function() { if (content) content.style.transition = ''; }, 200);
            }
          }, 80);
        }, deptAt);
      }

      // Expose so the in-game settings screen can trigger a language change on mobile
      window._applyLangUI    = applyLangUI;
      window._playLangGlitch = playElementGlitch;

      if (langInput) langInput.addEventListener('change', function() {
        var newLang = langInput.checked ? 'EN' : 'PT';
        applyLangUI(newLang);
        try { localStorage.setItem('vault84_lang', newLang); } catch(_) {}
        if (window._setLang) window._setLang(newLang);
        playElementGlitch();
      });
    });
  </script>
